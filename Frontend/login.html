<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriSense AI – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#0d9488;--teal-light:#2dd4bf;--teal-dark:#065f46;--error:#f87171;}
html,body{height:100%;min-height:100vh}
body{font-family:'DM Sans',sans-serif;background:#0a1f1a;display:flex;align-items:center;justify-content:center;padding:32px 16px;position:relative;overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 70% at 85% 10%, rgba(6,95,70,0.35) 0%, transparent 55%),radial-gradient(ellipse 70% 60% at 10% 90%, rgba(13,148,136,0.28) 0%, transparent 55%),radial-gradient(ellipse 40% 35% at 30% 30%, rgba(245,158,11,0.08) 0%, transparent 45%);}
.bg-noise{position:fixed;inset:0;z-index:0;opacity:0.4;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E")}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.logo-mark{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 24px rgba(13,148,136,0.4),0 0 0 1px rgba(45,212,191,0.25)}
.logo-name{font-family:'Fraunces',serif;font-size:18px;font-weight:900;color:#fff;letter-spacing:-.4px}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px 32px;backdrop-filter:blur(20px);box-shadow:0 24px 60px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.08)}
.card-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:#fff;margin-bottom:6px}
.card-sub{font-size:13.5px;color:rgba(255,255,255,.45);margin-bottom:28px;line-height:1.5}
.card-sub a{color:var(--teal-light);text-decoration:none;font-weight:500}
.card-sub a:hover{text-decoration:underline}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.3px}
.field input{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 15px;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;outline:none;transition:border-color .2s,box-shadow .2s;}
.field input::placeholder{color:rgba(255,255,255,.25)}
.field input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,.2)}
.field input.err{border-color:var(--error);box-shadow:0 0 0 3px rgba(248,113,113,.15)}
.btn-submit{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--teal),#0f766e);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:14px;border-radius:14px;border:none;cursor:pointer;margin-top:8px;box-shadow:0 6px 24px rgba(13,148,136,.4);transition:transform .18s,box-shadow .18s;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(13,148,136,.5)}
.divider{display:flex;align-items:center;gap:12px;margin:22px 0}
.divider span{font-size:12px;color:rgba(255,255,255,.25)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.signup-row{text-align:center;font-size:13.5px;color:rgba(255,255,255,.4)}
.signup-row a{color:var(--teal-light);text-decoration:none;font-weight:600}
.signup-row a:hover{text-decoration:underline}
.demo-hint{background:rgba(13,148,136,0.1);border:1px solid rgba(45,212,191,0.15);border-radius:12px;padding:12px 16px;margin-top:20px;font-size:12px;color:rgba(255,255,255,.45);line-height:1.6}
.demo-hint strong{color:rgba(45,212,191,.7)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(66px);background:#0c1a16;border:1px solid rgba(45,212,191,.3);color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:600;box-shadow:0 6px 22px rgba(0,0,0,.4);transition:transform .35s cubic-bezier(.16,1,.3,1),opacity .35s;opacity:0;pointer-events:none;z-index:999}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="bg"></div><div class="bg-noise"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-mark">🥗</div>
    <div class="logo-name">NutriSense AI</div>
  </div>
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to continue your health journey. <a href="signup.html">Need an account?</a></div>
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="pass">Password</label>
      <input type="password" id="pass" placeholder="Your password" autocomplete="current-password"/>
    </div>
    <button class="btn-submit" onclick="doLogin()">
      Sign In
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <div class="divider"><span>or</span></div>
    <div class="signup-row"><a href="signup.html">Create a new account</a></div>
    <div class="demo-hint">💡 <strong>New here?</strong> Sign up to create your profile and take the full assessment. Your data stays on your device.</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
if (localStorage.getItem('nc_user')) window.location.href = 'home.html';

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  let ok = true;

  [['email',email],['pass',pass]].forEach(([id,val]) => {
    const el = document.getElementById(id);
    if (!val) { el.classList.add('err'); ok = false; }
    else el.classList.remove('err');
  });
  if (!ok) { showToast('⚠️ Please enter email and password'); return; }

  try {
    const res = await fetch('http://localhost:8000/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem('nc_token', data.token);
      localStorage.setItem('nc_user', JSON.stringify(data.user));
      showToast('✅ Welcome back, ' + data.user.name.split(' ')[0] + '!');
      setTimeout(() => window.location.href = 'home.html', 800);
    } else {
      showToast('❌ ' + (data.error || 'Invalid email or password'));
    }
  } catch(e) {
    showToast('❌ Could not connect to server');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2600);
}
</script>
</body>
</html>
