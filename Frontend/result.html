<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriSense AI – Your Results</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--teal:#0d9488;--teal-light:#2dd4bf;--teal-dark:#065f46;--gold:#f59e0b;--gold-light:#fcd34d;--rose:#fb7185;--purple:#a78bfa;--sky:#38bdf8;}
html,body{min-height:100vh}
body{font-family:'DM Sans',sans-serif;background:#0a1f1a;display:flex;flex-direction:column;position:relative;overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 70% 60% at 8% 5%, rgba(13,148,136,0.28) 0%, transparent 55%),
    radial-gradient(ellipse 60% 55% at 92% 95%, rgba(6,95,70,0.32) 0%, transparent 55%),
    radial-gradient(ellipse 40% 35% at 50% 50%, rgba(245,158,11,0.06) 0%, transparent 50%)}
.bg-noise{position:fixed;inset:0;z-index:0;opacity:0.35;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E")}

nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(10,31,26,0.6);backdrop-filter:blur(16px)}
.nav-logo{display:flex;align-items:center;gap:8px}
.nav-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--teal),var(--teal-dark));display:flex;align-items:center;justify-content:center;font-size:16px}
.nav-name{font-family:'Fraunces',serif;font-size:16px;font-weight:900;color:#fff;letter-spacing:-.3px}
.btn-home{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;border-radius:99px;cursor:pointer;text-decoration:none;transition:all .2s}
.btn-home:hover{background:rgba(255,255,255,.09);color:rgba(255,255,255,.8)}

main{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:40px 20px 80px}

/* ── Hero ── */
.result-hero{text-align:center;margin-bottom:36px;animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.hero-badge{display:inline-flex;align-items:center;gap:8px;
  background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);
  color:#fcd34d;font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;
  padding:5px 16px;border-radius:99px;margin-bottom:16px}
.result-hero h1{font-family:'Fraunces',serif;font-size:clamp(28px,5vw,42px);font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:10px;line-height:1.1}
.result-hero h1 em{color:var(--teal-light);font-style:italic;font-weight:300}
.result-hero p{font-size:14px;color:rgba(255,255,255,.45);max-width:480px;margin:0 auto;line-height:1.65}

/* ── Primary deficiency card ── */
.primary-card{
  background:linear-gradient(135deg,rgba(6,95,70,0.6) 0%,rgba(13,148,136,0.4) 100%);
  border:1px solid rgba(45,212,191,.25);border-radius:22px;padding:32px;
  margin-bottom:20px;position:relative;overflow:hidden;
  animation:fadeUp .7s .1s cubic-bezier(.16,1,.3,1) both;
  backdrop-filter:blur(14px);
}
.primary-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 70% at 100% 50%,rgba(45,212,191,.07) 0%,transparent 60%);pointer-events:none}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.pc-label{font-size:10px;font-weight:700;color:rgba(45,212,191,.7);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}
.pc-deficiency{font-family:'Fraunces',serif;font-size:clamp(22px,4vw,32px);font-weight:700;color:#fff;letter-spacing:-.8px}
.pc-confidence{display:inline-flex;align-items:center;gap:8px;margin-top:10px;
  background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.2);
  border-radius:99px;padding:5px 14px;font-size:12px;font-weight:600;color:#5eead4}
.pc-confidence .conf-dot{width:6px;height:6px;border-radius:50%;background:#2dd4bf;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(45,212,191,.6)}50%{box-shadow:0 0 0 5px rgba(45,212,191,0)}}
.severity-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:12px;font-size:13px;font-weight:700}
.sev-high{background:rgba(251,113,133,.12);border:1px solid rgba(251,113,133,.3);color:#fda4af}
.sev-mod{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.28);color:#fcd34d}
.sev-low{background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.25);color:#5eead4}

.pc-bars{display:flex;flex-direction:column;gap:10px}
.pc-bar-row{display:flex;align-items:center;gap:12px}
.pc-bar-lbl{font-size:12px;font-weight:600;color:rgba(255,255,255,.6);min-width:100px}
.pc-bar-track{flex:1;height:7px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.pc-bar-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.fill-teal{background:linear-gradient(to right,var(--teal-dark),var(--teal-light))}
.fill-gold{background:linear-gradient(to right,#d97706,var(--gold-light))}
.fill-rose{background:linear-gradient(to right,#e11d48,var(--rose))}
.fill-purple{background:linear-gradient(to right,#7c3aed,var(--purple))}
.fill-sky{background:linear-gradient(to right,#0284c7,var(--sky))}
.pc-bar-val{font-size:12px;font-weight:700;color:rgba(255,255,255,.7);min-width:36px;text-align:right}

/* ── Grid of secondary cards ── */
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;
  animation:fadeUp .7s .2s cubic-bezier(.16,1,.3,1) both}
@media(max-width:560px){.result-grid{grid-template-columns:1fr}}
.r-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:18px;padding:22px;backdrop-filter:blur(10px);transition:border-color .2s}
.r-card:hover{border-color:rgba(45,212,191,.15)}
.r-card-icon{font-size:24px;margin-bottom:10px}
.r-card-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.8);margin-bottom:6px}
.r-card-body{font-size:12.5px;color:rgba(255,255,255,.4);line-height:1.65}
.r-card-body strong{color:rgba(255,255,255,.7)}

/* ── Recs ── */
.recs-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:26px;margin-bottom:20px;backdrop-filter:blur(10px);animation:fadeUp .7s .3s cubic-bezier(.16,1,.3,1) both}
.recs-title{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:#fff;margin-bottom:16px}
.rec-list{display:flex;flex-direction:column;gap:12px}
.rec-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:13px}
.rec-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.rec-text{flex:1}
.rec-text h4{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);margin-bottom:3px}
.rec-text p{font-size:12px;color:rgba(255,255,255,.4);line-height:1.55}

/* ── Action bar ── */
.action-bar{display:flex;gap:12px;flex-wrap:wrap;animation:fadeUp .7s .4s cubic-bezier(.16,1,.3,1) both}
.btn-reassess{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--teal),#0f766e);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:13px 24px;border-radius:14px;border:none;cursor:pointer;text-decoration:none;box-shadow:0 5px 20px rgba(13,148,136,.4);transition:transform .18s,box-shadow .18s}
.btn-reassess:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(13,148,136,.5)}
.btn-download{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:13px 24px;border-radius:14px;cursor:pointer;transition:all .2s}
.btn-download:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}

/* disclaimer */
.disclaimer{background:rgba(245,158,11,0.05);border:1px solid rgba(245,158,11,0.12);border-radius:14px;padding:14px 18px;margin-bottom:20px;animation:fadeUp .7s .35s cubic-bezier(.16,1,.3,1) both;font-size:12px;color:rgba(255,255,255,.35);line-height:1.6}
.disclaimer strong{color:rgba(245,158,11,.7)}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(66px);background:#0c1a16;border:1px solid rgba(45,212,191,.3);color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:600;box-shadow:0 6px 22px rgba(0,0,0,.4);transition:transform .35s cubic-bezier(.16,1,.3,1),opacity .35s;opacity:0;pointer-events:none;z-index:999}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<div class="bg"></div><div class="bg-noise"></div>

<nav>
  <div class="nav-logo">
    <div class="nav-mark">🥗</div>
    <div class="nav-name">NutriSense AI</div>
  </div>
  <a href="home.html" class="btn-home">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
    Home
  </a>
</nav>

<main>
  <div class="result-hero">
    <div class="hero-badge">✨ Assessment Complete</div>
    <h1>Your Nutritional<br><em>Deficiency Report</em></h1>
    <p>Based on your lifestyle, symptoms, and health profile, here's what our AI model identified.</p>
  </div>

  <!-- ── RESULT SECTION (modular – set window.deficiencyResult to override) ── -->
  <div class="primary-card" id="primaryCard">
    <div class="pc-top">
      <div>
        <div class="pc-label">Deficiency Detected</div>
        <div class="pc-deficiency" id="primaryDef">Iron Deficiency</div>
      </div>
    </div>
  </div>
  <!-- ── END RESULT SECTION ── -->

  <!-- REMOVED: result-grid (Contributing Factors, Risk Profile, Symptoms Linked, Timeline) -->
  <!-- REMOVED: disclaimer -->
  <!-- REMOVED: recs-card (Personalized Recommendations) -->

  <div class="action-bar">
    <a href="user_lifestyle.html" class="btn-reassess" onclick="retake()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Retake Assessment
    </a>
    <button class="btn-download" onclick="downloadReport()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Download Summary
    </button>
  </div>
</main>

<div class="toast" id="toast"></div>
<script>
// ─────────────────────────────────────────────────────────────
//  MODULAR RESULT RENDERER
//  To inject an AI/API result, call:
//    displayDeficiency("Iron Deficiency")
//  or set window.deficiencyResult before the page loads.
// ─────────────────────────────────────────────────────────────

/**
 * displayDeficiency(label)
 * Accepts a deficiency label string (e.g. "Iron Deficiency")
 * and updates the result card. Call this from your API handler.
 */
function displayDeficiency(label) {
  document.getElementById('primaryDef').textContent = label || 'Unknown';
}

(async function init() {
  if (window.deficiencyResult) { displayDeficiency(window.deficiencyResult); return; }

  try {
    const token   = localStorage.getItem('nc_token');
    const payload = JSON.parse(localStorage.getItem('nc_final') || '{}');

    if (!Object.keys(payload).length) {
      displayDeficiency('Incomplete Assessment');
      showToast('⚠️ No assessment data found. Please retake.');
      return;
    }

    const res = await fetch('http://localhost:8000/assessments/diagnose', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (token || '')
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    console.log('API response:', data);

    if (data.predicted_deficiency) {
      displayDeficiency(data.predicted_deficiency + ' Deficiency');
    } else {
      displayDeficiency('Unknown');
    }

  } catch(e) {
    console.error('API error:', e);
    showToast('❌ Could not connect to server. Is the backend running?');
    displayDeficiency('Server Unavailable');
  }
})();

// ── Utilities ──
function retake() {
  ['nc_lifestyle', 'nc_symptoms', 'nc_final'].forEach(k => localStorage.removeItem(k));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2600);
}
</script>
</body>
</html>
